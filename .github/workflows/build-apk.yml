name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        working-directory: reactvitemaket
        run: pnpm install

      - name: Build Vite
        working-directory: reactvitemaket
        run: pnpm build

      - name: Sync Capacitor
        working-directory: reactvitemaket
        run: npx cap sync android

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Make gradlew executable
        working-directory: reactvitemaket/android
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: reactvitemaket/android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: belpomoshnik-debug
          path: reactvitemaket/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
