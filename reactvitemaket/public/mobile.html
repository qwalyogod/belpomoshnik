<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Белпомощник — мобильный просмотр</title>
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; background: #0b0d13; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
      .wrap { min-height: 100dvh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; padding: 24px; }
      .label { color: #9aa3b2; font-size: 13px; letter-spacing: .2px; }
      .sub { color: #5a6473; font-size: 11px; }
      .phone {
        width: 390px; height: 844px; max-height: 92dvh;
        background: #000; border-radius: 46px; padding: 12px;
        box-shadow: 0 40px 120px -20px rgba(0,0,0,.75), 0 0 0 1px rgba(255,255,255,.05);
      }
      .screen { width: 100%; height: 100%; border-radius: 36px; overflow: hidden; background: #f6f7fb; position: relative; }
      iframe { width: 100%; height: 100%; border: 0; display: block; }
      @media (max-width: 440px) {
        .wrap { padding: 0; gap: 0; }
        .label, .sub { display: none; }
        .phone { width: 100%; height: 100dvh; max-height: none; border-radius: 0; padding: 0; box-shadow: none; }
        .screen { border-radius: 0; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="label">Белпомощник · мобильный просмотр</div>
      <div class="phone">
        <div class="screen">
          <iframe src="/" title="Белпомощник" allow="clipboard-write; geolocation"></iframe>
        </div>
      </div>
      <div class="sub">localhost:8560/mobile.html · обновите, если приложение не загрузилось</div>
    </div>
  </body>
</html>
